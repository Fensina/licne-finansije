<!doctype html>
<html lang="sr">
  <head>
    <meta charset="utf-8" />
    <title>Lične finansije – praćenje</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Lične finansije Nada</h1>
        <p>Praćenje prihoda i rashoda – dnevno, mesečno i godišnje</p>
      </header>

      <main class="app-main">
        <section class="card">
          <h2>Novi unos</h2>
          <form id="transaction-form">
            <div class="form-row">
              <label for="date">Datum</label>
              <input type="date" id="date" required />
            </div>

            <div class="form-row">
              <label for="type">Tip</label>
              <select id="type" required>
                <option value="income">Prihod</option>
                <option value="expense">Rashod</option>
              </select>
            </div>

            <div class="form-row">
              <label for="category">Kategorija</label>
              <input
                type="text"
                id="category"
                placeholder="Plata, hrana, kirija..."
              />
            </div>

            <div class="form-row">
              <label for="description">Opis</label>
              <input type="text" id="description" placeholder="(opciono)" />
            </div>

            <div class="form-row">
              <label for="amount">Iznos (RSD)</label>
              <input
                type="number"
                id="amount"
                min="0"
                step="0.01"
                required
              />
            </div>

            <button type="submit" class="btn primary">Sačuvaj unos</button>
          </form>
        </section>

        <section class="card">
          <h2>Pregled</h2>

          <div class="filters">
            <div class="form-row">
              <label for="view-mode">Period</label>
              <select id="view-mode">
                <option value="daily">Dnevni</option>
                <option value="monthly">Mesečni</option>
                <option value="yearly">Godišnji</option>
                <option value="all">Svi unosi</option>
              </select>
            </div>

            <div class="form-row" id="date-filter-row">
              <label for="view-date">Datum / mesec / godina</label>
              <input type="date" id="view-date" />
            </div>
          </div>

          <div class="summary">
            <div class="summary-item income">
              <span>Prihodi</span>
              <strong id="summary-income">0 RSD</strong>
            </div>
            <div class="summary-item expense">
              <span>Rashodi</span>
              <strong id="summary-expense">0 RSD</strong>
            </div>
            <div class="summary-item balance">
              <span>Bilans</span>
              <strong id="summary-balance">0 RSD</strong>
            </div>
          </div>
        </section>

        <section class="card">
          <h2>Lista transakcija</h2>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Datum</th>
                  <th>Tip</th>
                  <th>Kategorija</th>
                  <th>Opis</th>
                  <th class="right">Iznos (RSD)</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="transactions-body">
                <!-- dinamički popunjeno -->
              </tbody>
            </table>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <small>Podaci se čuvaju lokalno u vašem pregledaču.</small>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
